<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Life Planner</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
        }

        h1 { font-size: 1.8rem; color: var(--accent); }

        .views-nav {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .view-btn.active, .view-btn:hover {
            background: var(--accent);
            color: var(--bg-main);
            border-color: var(--accent);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .main-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
        }

        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .planner-view { display: none; }
        .planner-view.active { display: block; }

        /* Form Inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }

        input, select, textarea {
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .row-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .submit-btn {
            background: var(--accent);
            color: var(--bg-main);
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        .submit-btn:hover { background: var(--accent-hover); }

        /* Calendar Styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .cal-header {
            text-align: center;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding-bottom: 5px;
        }
        .cal-day {
            background: var(--bg-main);
            border: 1px solid var(--border);
            aspect-ratio: 1;
            border-radius: 6px;
            padding: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cal-day:hover, .cal-day.selected { border-color: var(--accent); }
        .cal-day.today { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); }
        .dot-indicator {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-top: auto;
            align-self: center;
        }

        /* Task & Goal Lists */
        .item-list { list-style: none; margin-top: 10px; }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-main);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        .item-left { display: flex; flex-direction: column; gap: 4px; }
        .item-title { font-weight: 500; }
        .item-meta { font-size: 0.75rem; color: var(--text-muted); }
        .delete-btn {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .view-title-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="current-date-display">Loading...</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 2px;">Your Ultimate Framework Hub</p>
        </div>
        <div class="views-nav">
            <button class="view-btn active" onclick="switchView('day')">Day</button>
            <button class="view-btn" onclick="switchView('month')">Month</button>
            <button class="view-btn" onclick="switchView('year')">Year Goals</button>
        </div>
    </header>

    <div class="grid-layout">
        <!-- Main Panel Content -->
        <main class="main-card">
            
            <!-- DAY VIEW -->
            <div id="day-view" class="planner-view active">
                <div class="view-title-header">
                    <h2 id="day-view-title">Today's Schedule</h2>
                </div>
                <ul id="day-tasks-list" class="item-list"></ul>
            </div>

            <!-- MONTH VIEW -->
            <div id="month-view" class="planner-view">
                <div class="view-title-header">
                    <h2 id="month-view-title">Calendar Matrix</h2>
                </div>
                <div class="calendar-grid" id="calendar-matrix-container"></div>
            </div>

            <!-- YEAR VIEW -->
            <div id="year-view" class="planner-view">
                <div class="view-title-header">
                    <h2>Strategic Annual Targets</h2>
                </div>
                <div class="form-group">
                    <label>Add Macro Year Goal</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="year-goal-input" placeholder="e.g., Launch clothing collection brand, Reach intermediate fluency..." style="flex:1;">
                        <button class="submit-btn" onclick="addYearGoal()" style="margin:0; padding:0 20px;">Add</button>
                    </div>
                </div>
                <ul id="year-goals-list" class="item-list"></ul>
            </div>

        </main>

        <!-- Sidebar Creator Panel -->
        <aside class="sidebar-card">
            <h3>Task & Focus Engine</h3>
            
            <div class="form-group">
                <label for="task-title">Action Item Title</label>
                <input type="text" id="task-title" placeholder="Workout, Coding block, Study session...">
            </div>

            <div class="row-inputs">
                <div class="form-group">
                    <label for="task-date">Target Date</label>
                    <input type="date" id="task-date">
                </div>
                <div class="form-group">
                    <label for="task-duration">Duration (Hours)</label>
                    <input type="number" id="task-duration" min="0.5" max="24" step="0.5" value="1">
                </div>
            </div>

            <div class="row-inputs">
                <div class="form-group">
                    <label for="task-repeat">Recurrence</label>
                    <select id="task-repeat">
                        <option value="none">One-time</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-repeat-count">Repeat Count</label>
                    <input type="number" id="task-repeat-count" min="1" max="365" value="1">
                </div>
            </div>

            <button class="submit-btn" onclick="saveNewTask()">Deploy to Schedule</button>
        </aside>
    </div>
</div>

<script>
    // State management and LocalStorage
    let selectedDateStr = new Date().toISOString().split('T')[0];
    let tasks = JSON.parse(localStorage.getItem('planner_tasks')) || [];
    let yearGoals = JSON.parse(localStorage.getItem('planner_year_goals')) || [];

    // Initialize fields
    document.getElementById('task-date').value = selectedDateStr;

    function formatDisplayDate(dateObj) {
        return dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function updateHeaderDate() {
        document.getElementById('current-date-display').innerText = formatDisplayDate(new Date());
    }

    function switchView(viewName) {
        document.querySelectorAll('.planner-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`${viewName}-view`).classList.add('active');
        event.currentTarget.classList.add('active');

        if(viewName === 'month') renderCalendarMatrix();
        if(viewName === 'day') renderDayTasks();
        if(viewName === 'year') renderYearGoals();
    }

    function saveNewTask() {
        const title = document.getElementById('task-title').value.trim();
        const dateBase = document.getElementById('task-date').value;
        const duration = document.getElementById('task-duration').value;
        const repeat = document.getElementById('task-repeat').value;
        const count = parseInt(document.getElementById('task-repeat-count').value) || 1;

        if (!title || !dateBase) {
            alert('Please provide a title and target start date.');
            return;
        }

        let currentDate = new Date(dateBase);

        for (let i = 0; i < count; i++) {
            const dateStr = currentDate.toISOString().split('T')[0];
            tasks.push({
                id: Date.now() + Math.random().toString(36).substr(2, 5),
                title,
                date: dateStr,
                duration,
                repeatType: repeat,
                instance: i + 1
            });

            if (repeat === 'daily') {
                currentDate.setDate(currentDate.getDate() + 1);
            } else if (repeat === 'weekly') {
                currentDate.setDate(currentDate.getDate() + 7);
            } else {
                break; // One-time structural task
            }
        }

        localStorage.setItem('planner_tasks', JSON.stringify(tasks));
        document.getElementById('task-title').value = '';
        renderDayTasks();
        renderCalendarMatrix();
    }

    function renderDayTasks() {
        const listContainer = document.getElementById('day-tasks-list');
        listContainer.innerHTML = '';
        
        const dayTitleDate = new Date(selectedDateStr + 'T00:00:00');
        document.getElementById('day-view-title').innerText = `Schedule for ${dayTitleDate.toLocaleDateString('en-US', {month:'long', day:'numeric'})}`;

        const filtered = tasks.filter(t => t.date === selectedDateStr);

        if(filtered.length === 0) {
            listContainer.innerHTML = `<li style="color: var(--text-muted); font-style: italic;">No activities plotted for this day. Ready for design inputs.</li>`;
            return;
        }

        filtered.forEach(t => {
            const li = document.createElement('li');
            li.className = 'item-row';
            li.innerHTML = `
                <div class="item-left">
                    <span class="item-title">${t.title}</span>
                    <span class="item-meta">⏱️ ${t.duration} hrs ${t.repeatType !== 'none' ? `| Inst. #${t.instance}` : ''}</span>
                </div>
                <button class="delete-btn" onclick="deleteTask('${t.id}')">✕</button>
            `;
            listContainer.appendChild(li);
        });
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('planner_tasks', JSON.stringify(tasks));
        renderDayTasks();
        renderCalendarMatrix();
    }

    function renderCalendarMatrix() {
        const container = document.getElementById('calendar-matrix-container');
        container.innerHTML = '';

        const now = new Date(selectedDateStr + 'T00:00:00');
        const year = now.getFullYear();
        const month = now.getMonth();

        document.getElementById('month-view-title').innerText = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

        const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        daysOfWeek.forEach(d => {
            const h = document.createElement('div');
            h.className = 'cal-header';
            h.innerText = d;
            container.appendChild(h);
        });

        const firstDayIdx = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDayIdx; i++) {
            container.appendChild(document.createElement('div'));
        }

        const todayStr = new Date().toISOString().split('T')[0];

        for (let day = 1; day <= totalDays; day++) {
            const currentLoopDate = new Date(year, month, day);
            const loopDateStr = currentLoopDate.toISOString().split('T')[0];

            const dayDiv = document.createElement('div');
            dayDiv.className = 'cal-day';
            if (loopDateStr === todayStr) dayDiv.classList.add('today');
            if (loopDateStr === selectedDateStr) dayDiv.classList.add('selected');

            dayDiv.innerHTML = `<span>${day}</span>`;

            const hasTasks = tasks.some(t => t.date === loopDateStr);
            if (hasTasks) {
                const dot = document.createElement('div');
                dot.className = 'dot-indicator';
                dayDiv.appendChild(dot);
            }

            dayDiv.onclick = () => {
                selectedDateStr = loopDateStr;
                document.getElementById('task-date').value = selectedDateStr;
                switchView('day');
            };

            container.appendChild(dayDiv);
        }
    }

    function addYearGoal() {
        const input = document.getElementById('year-goal-input');
        const val = input.value.trim();
        if(!val) return;

        yearGoals.push({ id: Date.now().toString(), text: val });
        localStorage.setItem('planner_year_goals', JSON.stringify(yearGoals));
        input.value = '';
        renderYearGoals();
    }

    function deleteYearGoal(id) {
        yearGoals = yearGoals.filter(g => g.id !== id);
        localStorage.setItem('planner_year_goals', JSON.stringify(yearGoals));
        renderYearGoals();
    }

    function renderYearGoals() {
        const list = document.getElementById('year-goals-list');
        list.innerHTML = '';
        if(yearGoals.length === 0) {
            list.innerHTML = `<li style="color: var(--text-muted); font-style: italic;">No macro milestones logged yet.</li>`;
            return;
        }
        yearGoals.forEach(g => {
            const li = document.createElement('li');
            li.className = 'item-row';
            li.innerHTML = `
                <span class="item-title">🎯 ${g.text}</span>
                <button class="delete-btn" onclick="deleteYearGoal('${g.id}')">✕</button>
            `;
            list.appendChild(li);
        });
    }

    // Initial load configurations
    updateHeaderDate();
    renderDayTasks();
</script>
</body>
</html>
